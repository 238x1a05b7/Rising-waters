<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction System</title>
    <!-- Linking to your static CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card-container">
        <h2 class="title">☁️ Flood Prediction System</h2>
        
        <form id="predictForm">
            <div class="form-group">
                <label>Temperature (°C)</label>
                <input type="number" id="Temperature" placeholder="15 - 45 (e.g. 28)" required step="any">
            </div>

            <div class="form-group">
                <label>Humidity (%)</label>
                <input type="number" id="Humidity" placeholder="30 - 100 (e.g. 70)" required step="any">
            </div>

            <div class="form-group">
                <label>Cloud Cover (%)</label>
                <input type="number" id="Cloud_Cover" placeholder="0 - 100 (e.g. 60)" required step="any">
            </div>

            <div class="form-group">
                <label>Annual Rainfall (mm)</label>
                <input type="number" id="Annual_Rainfall" placeholder="500 - 3000 (e.g. 1200)" required step="any">
            </div>

            <div class="form-group">
                <label>Jan-Feb Rainfall (mm)</label>
                <input type="number" id="Jan_Feb" placeholder="0 - 500 (e.g. 50)" required step="any">
            </div>

            <div class="form-group">
                <label>Mar-May Rainfall (mm)</label>
                <input type="number" id="Mar_May" placeholder="0 - 800 (e.g. 200)" required step="any">
            </div>

            <div class="form-group">
                <label>Jun-Sep Rainfall (mm)</label>
                <input type="number" id="Jun_Sep" placeholder="100 - 1500 (e.g. 800)" required step="any">
            </div>

            <div class="form-group">
                <label>Oct-Dec Rainfall (mm)</label>
                <input type="number" id="Oct_Dec" placeholder="0 - 800 (e.g. 300)" required step="any">
            </div>

            <div class="form-group">
                <label>Average June Rainfall (mm)</label>
                <input type="number" id="Avg_June" placeholder="0 - 500 (e.g. 100)" required step="any">
            </div>

            <div class="form-group">
                <label>Flood Risk Index</label>
                <input type="number" id="Flood_Risk_Index" placeholder="0 - 1 (e.g. 0.5)" required step="any">
            </div>

            <div class="btn-container">
                <button type="submit" id="predictBtn">☁️ Predict</button>
            </div>
        </form>

        <!-- Container to show prediction results dynamically underneath -->
        <div id="resultContainer" class="result-box hidden">
            <h3>Prediction Result:</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <!-- Linking to your script file -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
